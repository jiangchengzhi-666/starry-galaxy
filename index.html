<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小芮专属</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Georgia','Songti SC','STSong',serif;-webkit-tap-highlight-color:transparent;user-select:none}
        body{background:#080810;display:flex;align-items:center;justify-content:center;flex-direction:column}
        .bg{position:fixed;inset:0;background:radial-gradient(ellipse at 25% 15%,rgba(50,25,70,0.5) 0%,transparent 55%),radial-gradient(ellipse at 75% 85%,rgba(35,18,50,0.4) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,#151020 0%,#080810 100%);z-index:0}
        .vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.5) 100%);z-index:0;pointer-events:none}
        #particles{position:fixed;inset:0;z-index:1;pointer-events:none}
        .cake-scene{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;animation:flt 6s ease-in-out infinite;opacity:0;transition:opacity 1.5s ease}
        .cake-scene.show{opacity:1}
        @keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        #cakeCanvas{display:block}
        .title{color:#d4af37;font-size:24px;text-align:center;margin-top:20px;text-shadow:0 0 24px rgba(212,175,55,0.3),0 0 48px rgba(212,175,55,0.1);letter-spacing:12px;font-weight:normal;animation:tglow 4s ease-in-out infinite}
        @keyframes tglow{0%,100%{text-shadow:0 0 20px rgba(212,175,55,0.2),0 0 40px rgba(212,175,55,0.06)}50%{text-shadow:0 0 35px rgba(212,175,55,0.4),0 0 70px rgba(212,175,55,0.15)}}
        .subtitle{color:rgba(212,175,55,0.3);font-size:11px;text-align:center;margin-top:6px;letter-spacing:5px}
        .voice-bar{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;color:rgba(212,175,55,0.3);font-size:10px;letter-spacing:1px;z-index:100;opacity:0;transition:opacity 1.2s ease}
        .voice-bar.show{opacity:1}
        .mic{width:26px;height:26px;border-radius:50%;border:1px solid rgba(212,175,55,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;background:rgba(212,175,55,0.03);animation:mp 3s ease-in-out infinite;transition:all .3s}
        .mic.active{border-color:rgba(212,175,55,0.45);background:rgba(212,175,55,0.1)}
        @keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0.1)}50%{box-shadow:0 0 0 8px rgba(212,175,55,0)}}
        .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:rgba(12,10,22,0.95);border:1px solid rgba(212,175,55,0.2);border-radius:24px;padding:28px 40px;color:#f0e0cc;font-size:18px;letter-spacing:3px;text-align:center;opacity:0;transition:all .6s cubic-bezier(.34,1.56,.64,1);z-index:1000;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 28px 72px rgba(0,0,0,0.5),0 0 56px rgba(212,175,55,0.08);pointer-events:none}
        .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
        .toast-icon{font-size:28px;display:block;margin-bottom:10px}

        /* ===== START OVERLAY ===== */
        .start-overlay{position:fixed;inset:0;background:rgba(8,8,16,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;cursor:pointer;transition:opacity 1s ease}
        .start-overlay.hide{opacity:0;pointer-events:none}
        .start-btn{background:transparent;border:1px solid rgba(212,175,55,0.25);color:#d4af37;padding:16px 44px;font-size:15px;border-radius:50px;cursor:pointer;letter-spacing:8px;font-family:inherit;position:relative;overflow:hidden;transition:all .4s}
        .start-btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(212,175,55,0.06) 50%,transparent 70%);animation:shm 3.5s ease-in-out infinite}
        @keyframes shm{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
        .start-btn:active{background:rgba(212,175,55,0.08);transform:scale(.97)}
        .start-hint{color:rgba(212,175,55,0.2);font-size:10px;margin-top:18px;letter-spacing:3px}

        /* ===== SLIDESHOW ===== */
        .slideshow{position:fixed;inset:0;z-index:8000;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .8s ease}
        .slideshow.active{opacity:1;pointer-events:auto}
        .sl-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(40,20,50,0.6) 0%,rgba(8,8,16,0.95) 100%)}
        .slide{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:all .8s cubic-bezier(.25,.46,.45,.94);width:90%;max-width:400px}
        .slide.in{opacity:1}
        .slide.out{opacity:0}

        /* Slide text styles */
        .s-title{color:#d4af37;font-size:28px;letter-spacing:8px;text-shadow:0 0 30px rgba(212,175,55,0.4);margin-bottom:8px}
        .s-main{color:#f0dcc0;font-size:22px;letter-spacing:4px;text-shadow:0 0 20px rgba(212,175,55,0.2);line-height:1.8}
        .s-sub{color:rgba(212,175,55,0.5);font-size:13px;letter-spacing:3px;margin-top:6px}
        .s-num{color:#e8a0a0;font-size:42px;font-weight:bold;text-shadow:0 0 30px rgba(232,160,160,0.4);letter-spacing:2px}
        .s-num-unit{color:#e8a0a0;font-size:16px;letter-spacing:3px;margin-top:4px}
        .s-heart{font-size:48px;display:block;margin-top:12px;animation:heartbeat 1.2s ease-in-out infinite}
        .s-love{color:#e8a0a0;font-size:32px;letter-spacing:10px;text-shadow:0 0 40px rgba(232,160,160,0.5)}
        @keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

        /* Slide entrance animations */
        .slide-anim-up .s-title,.slide-anim-up .s-main,.slide-anim-up .s-sub{animation:slideUp .8s ease both}
        .slide-anim-up .s-main{animation-delay:.15s}
        .slide-anim-up .s-sub{animation-delay:.3s}

        .slide-anim-left .s-title,.slide-anim-left .s-main,.slide-anim-left .s-sub{animation:slideLeft .8s ease both}
        .slide-anim-left .s-main{animation-delay:.15s}
        .slide-anim-left .s-sub{animation-delay:.3s}

        .slide-anim-right .s-title,.slide-anim-right .s-main,.slide-anim-right .s-sub{animation:slideRight .8s ease both}
        .slide-anim-right .s-main{animation-delay:.15s}
        .slide-anim-right .s-sub{animation-delay:.3s}

        .slide-anim-scale .s-title,.slide-anim-scale .s-main,.slide-anim-scale .s-sub{animation:scaleUp .8s ease both}
        .slide-anim-scale .s-main{animation-delay:.15s}
        .slide-anim-scale .s-sub{animation-delay:.3s}

        .slide-anim-fade .s-title,.slide-anim-fade .s-main,.slide-anim-fade .s-sub{animation:fadeInUp .8s ease both}
        .slide-anim-fade .s-main{animation-delay:.2s}
        .slide-anim-fade .s-sub{animation-delay:.4s}

        .slide-anim-glow .s-title,.slide-anim-glow .s-main,.slide-anim-glow .s-sub{animation:glowIn 1s ease both}
        .slide-anim-glow .s-main{animation-delay:.2s}
        .slide-anim-glow .s-sub{animation-delay:.4s}

        @keyframes slideUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
        @keyframes slideLeft{0%{opacity:0;transform:translateX(-50px)}100%{opacity:1;transform:translateX(0)}}
        @keyframes slideRight{0%{opacity:0;transform:translateX(50px)}100%{opacity:1;transform:translateX(0)}}
        @keyframes scaleUp{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
        @keyframes fadeInUp{0%{opacity:0;transform:translateY(20px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes glowIn{0%{opacity:0;text-shadow:0 0 0 transparent}50%{opacity:.8}100%{opacity:1}}

        /* Floating hearts in slideshow */
        .float-heart{position:absolute;color:rgba(232,160,160,0.25);font-size:20px;pointer-events:none;animation:fh linear infinite;bottom:-30px}
        @keyframes fh{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:0}10%{opacity:.5}80%{opacity:.4}100%{transform:translateY(-110vh) rotate(360deg) scale(.5);opacity:0}}

        /* Sparkle dots in slideshow */
        .sl-sparkle{position:absolute;width:3px;height:3px;background:rgba(212,175,55,0.5);border-radius:50%;pointer-events:none;animation:ssp 2s ease-in-out infinite}
        @keyframes ssp{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

        /* Gift button */
        .gift-btn-wrap{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:all 1.2s cubic-bezier(.25,.46,.45,.94);pointer-events:none;z-index:10}
        .gift-btn-wrap.show{opacity:1;pointer-events:auto}
        .gift-btn{background:transparent;border:1.5px solid rgba(232,160,160,0.35);color:#e8a0a0;padding:18px 44px;font-size:16px;border-radius:50px;cursor:pointer;letter-spacing:4px;font-family:inherit;position:relative;overflow:hidden;transition:all .5s cubic-bezier(.34,1.56,.64,1);animation:giftPulse 2.5s ease-in-out infinite}
        .gift-btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(232,160,160,0.08) 50%,transparent 70%);animation:shm 3s ease-in-out infinite}
        .gift-btn:active{transform:scale(.95);background:rgba(232,160,160,0.06)}
        @keyframes giftPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,160,160,0.12)}50%{box-shadow:0 0 0 16px rgba(232,160,160,0)}}
        .gift-hint{color:rgba(232,160,160,0.3);font-size:11px;margin-top:14px;letter-spacing:2px}
        .gift-arrow{display:block;margin-top:22px;color:rgba(232,160,160,0.25);font-size:22px;animation:arrowBounce 1.5s ease-in-out infinite}
        @keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
        @keyframes giftPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,160,160,0.12)}50%{box-shadow:0 0 0 16px rgba(232,160,160,0)}}
        .gift-hint{color:rgba(232,160,160,0.3);font-size:11px;margin-top:14px;letter-spacing:2px;animation:fadeInUp .8s ease both .3s}
        .gift-arrow{display:block;margin-top:22px;color:rgba(232,160,160,0.25);font-size:22px;animation:arrowBounce 1.5s ease-in-out infinite}
        @keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

        /* Gift button after slideshow */
        .gift-btn-wrap{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);text-align:center;opacity:0;transition:all 1s cubic-bezier(.25,.46,.45,.94);pointer-events:none}
        .gift-btn-wrap.show{opacity:1;pointer-events:auto}
        .gift-btn{background:transparent;border:1.5px solid rgba(232,160,160,0.4);color:#e8a0a0;padding:18px 42px;font-size:16px;border-radius:50px;cursor:pointer;letter-spacing:4px;font-family:inherit;position:relative;overflow:hidden;transition:all .5s cubic-bezier(.34,1.56,.64,1);animation:giftPulse 2.5s ease-in-out infinite}
        .gift-btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(232,160,160,0.08) 50%,transparent 70%);animation:shm 3s ease-in-out infinite}
        .gift-btn:active{transform:scale(.95);background:rgba(232,160,160,0.08)}
        @keyframes giftPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,160,160,0.15)}50%{box-shadow:0 0 0 14px rgba(232,160,160,0)}}
        .gift-hint{color:rgba(232,160,160,0.35);font-size:11px;margin-top:14px;letter-spacing:2px;animation:fadeInUp .8s ease both .3s}
        .gift-arrow{display:block;margin-top:20px;color:rgba(232,160,160,0.3);font-size:20px;animation:arrowBounce 1.5s ease-in-out infinite}
        @keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

        /* ===== BG EFFECTS ===== */
        .bokeh{position:fixed;border-radius:50%;pointer-events:none;z-index:2;animation:bk linear infinite}
        @keyframes bk{0%{transform:translate(0,0) scale(1);opacity:.2}25%{transform:translate(12px,-18px) scale(1.06);opacity:.4}50%{transform:translate(-8px,-8px) scale(.94);opacity:.25}75%{transform:translate(16px,8px) scale(1.08);opacity:.45}100%{transform:translate(0,0) scale(1);opacity:.2}}
        .star{position:fixed;background:rgba(212,175,55,0.5);border-radius:50%;pointer-events:none;z-index:1;animation:tw ease-in-out infinite}
        @keyframes tw{0%,100%{opacity:.12;transform:scale(.7)}50%{opacity:.65;transform:scale(1.3)}}
        .spark{position:fixed;width:3px;height:3px;background:#d4af37;border-radius:50%;pointer-events:none;z-index:50;animation:bst .7s ease-out forwards}
        @keyframes bst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
        .ripple{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;border:1px solid rgba(212,175,55,0.35);z-index:999;animation:rp 1.8s ease-out forwards;pointer-events:none}
        @keyframes rp{0%{width:8px;height:8px;opacity:.5}100%{width:400px;height:400px;opacity:0}}
        @media(max-height:640px){.title{font-size:20px;margin-top:14px}.s-title{font-size:22px}.s-main{font-size:18px}.s-num{font-size:36px}}
    </style>
</head>
<body>
<div class="bg"></div>
<div class="vignette"></div>
<canvas id="particles"></canvas>

<!-- Start overlay -->
<div class="start-overlay" id="startOverlay">
    <button class="start-btn">✦ 开 启 ✦</button>
    <div class="start-hint">送给我最特别的人</div>
</div>

<!-- Slideshow -->
<div class="slideshow" id="slideshow">
    <div class="sl-bg"></div>
</div>

<!-- Cake scene -->
<div class="cake-scene" id="cakeScene">
    <canvas id="cakeCanvas"></canvas>
    <div class="title">小 芮 专 属</div>
    <div class="subtitle">JUST FOR YOU</div>
</div>

<div class="voice-bar" id="voiceBar"><div class="mic" id="micIcon">🎤</div><span>语音已开启 · 试试说"小芮是谁"</span></div>
<div class="toast" id="toast"><span class="toast-icon">💕</span>小芮是我的宝宝</div>

<script>
/* ============ PARTICLES ============ */
const pv=document.getElementById('particles'),px=pv.getContext('2d');
let PW,PH;
function rszP(){PW=pv.width=innerWidth;PH=pv.height=innerHeight}rszP();addEventListener('resize',rszP);
const GC=[[212,175,55],[235,210,170],[183,110,121],[245,220,185],[220,195,155]];
class Pt{constructor(s){this.r(s)}r(s){this.x=Math.random()*PW;this.y=s?Math.random()*PH:PH+15;this.sz=Math.random()*2.2+.4;this.vy=-(Math.random()*.35+.12);this.vx=(Math.random()-.5)*.15;this.a=Math.random()*.35+.1;this.l=0;this.m=Math.random()*450+200;this.c=GC[Math.random()*5|0];this.w=Math.random()*6.28;this.ws=Math.random()*.015+.004}u(){this.w+=this.ws;this.x+=this.vx+Math.sin(this.w)*.12;this.y+=this.vy;this.l++;if(this.l>this.m||this.y<-15)this.r(false)}d(){const fi=Math.min(1,this.l/50),fo=Math.min(1,(this.m-this.l)/70);px.beginPath();px.arc(this.x,this.y,this.sz,0,6.28);px.fillStyle=`rgba(${this.c[0]},${this.c[1]},${this.c[2]},${this.a*fi*fo})`;px.fill()}}
const pts=Array.from({length:40},()=>new Pt(true));
!function lp(){px.clearRect(0,0,PW,PH);for(const p of pts){p.u();p.d()}requestAnimationFrame(lp)}();

/* ============ BOKEH + STARS ============ */
const bkC=['rgba(212,175,55,0.05)','rgba(183,110,121,0.04)','rgba(235,210,170,0.04)','rgba(200,175,155,0.04)'];
for(let i=0;i<7;i++){const e=document.createElement('div');e.className='bokeh';const s=Math.random()*65+22;e.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${bkC[i%4]};animation-duration:${Math.random()*14+10}s;animation-delay:${-Math.random()*12}s`;document.body.appendChild(e)}
for(let i=0;i<25;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*1.8+.8;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${z}px;height:${z}px;animation-duration:${Math.random()*3.5+2}s;animation-delay:${-Math.random()*4}s`;document.body.appendChild(s)}

/* ============ SLIDESHOW ============ */
const SLIDES=[
    {anim:'slide-anim-scale',html:'<div class="s-title">亲爱的小芮</div><div class="s-sub">有些话 想对你说</div>'},
    {anim:'slide-anim-left',html:'<div class="s-main">遇见你</div><div class="s-sub">是我这辈子最幸运的事</div>'},
    {anim:'slide-anim-right',html:'<div class="s-main">和你在一起的每一天</div><div class="s-sub">都值得被记住</div>'},
    {anim:'slide-anim-up',html:'<div class="s-num">198</div><div class="s-num-unit">天</div><div class="s-sub">我们一起走过的日子</div>'},
    {anim:'slide-anim-fade',html:'<div class="s-main">你的笑容</div><div class="s-sub">是我见过最美的风景</div>'},
    {anim:'slide-anim-glow',html:'<div class="s-main">想和你一起</div><div class="s-sub">看遍世间所有美好</div>'},
    {anim:'slide-anim-scale',html:'<div class="s-main">余生很长</div><div class="s-sub">只想和你慢慢走</div>'},
    {anim:'slide-anim-up',html:'<div class="s-love">爱你</div><div class="s-heart">❤</div>'}
];

function createSlideshow(){
    const sl=document.getElementById('slideshow');
    // Floating hearts
    for(let i=0;i<12;i++){
        const h=document.createElement('div');
        h.className='float-heart';
        h.textContent=['❤','♡','♥','💕'][Math.random()*4|0];
        h.style.cssText=`left:${Math.random()*100}%;animation-duration:${Math.random()*6+6}s;animation-delay:${-Math.random()*8}s;font-size:${Math.random()*16+14}px`;
        sl.appendChild(h);
    }
    // Sparkle dots
    for(let i=0;i<15;i++){
        const sp=document.createElement('div');
        sp.className='sl-sparkle';
        sp.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*2+1.5}s;animation-delay:${-Math.random()*2}s`;
        sl.appendChild(sp);
    }
}

function playSlideshow(onDone){
    const sl=document.getElementById('slideshow');
    sl.classList.add('active');
    let idx=0;
    const DURATION=2800,FADE=600;

    // Create gift button (hidden)
    const gw=document.createElement('div');
    gw.className='gift-btn-wrap';
    gw.innerHTML='<button class="gift-btn">给宝宝做的蛋糕 请查收</button><div class="gift-hint">点一下 有惊喜</div><div class="gift-arrow">↓</div>';
    gw.querySelector('.gift-btn').addEventListener('click',function(){
        gw.classList.remove('show');
        setTimeout(()=>{
            sl.classList.remove('active');
            setTimeout(onDone,800);
        },500);
    });
    sl.appendChild(gw);

    function showSlide(){
        if(idx>=SLIDES.length){
            // Show gift button
            requestAnimationFrame(()=>requestAnimationFrame(()=>gw.classList.add('show')));
            return;
        }
        const old=sl.querySelector('.slide.in');
        if(old){old.classList.remove('in');old.classList.add('out');setTimeout(()=>old.remove(),FADE)}
        const s=SLIDES[idx];
        const el=document.createElement('div');
        el.className=`slide ${s.anim}`;
        el.innerHTML=s.html;
        sl.appendChild(el);
        requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('in')));
        idx++;
        setTimeout(showSlide,DURATION);
    }
    showSlide();
}

createSlideshow();

/* ============ CAKE RENDERER ============ */
const cc=document.getElementById('cakeCanvas'),cx=cc.getContext('2d');
let S=1,CW,CH;

function initCake(){
    const w=Math.min(320,innerWidth-32);
    S=w/320;
    CW=w;CH=w*1.45;
    cc.width=CW;cc.height=CH;
    cc.style.width=CW+'px';cc.style.height=CH+'px';
}
initCake();

function rr(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.arcTo(x+w,y,x+w,y+h,r);cx.arcTo(x+w,y+h,x,y+h,r);cx.arcTo(x,y+h,x,y,r);cx.arcTo(x,y,x+w,y,r);cx.closePath()}
function sh(blur,col,fn){cx.save();cx.shadowBlur=blur;cx.shadowColor=col;cx.shadowOffsetY=blur*.3;fn();cx.restore()}

function drawStand(){
    const x=CW/2,y=CH-28*S,w=260*S,h=16*S;
    const g=cx.createLinearGradient(x-w/2,y,x+w/2,y);
    g.addColorStop(0,'#b8960b');g.addColorStop(.3,'#d4af37');g.addColorStop(.7,'#d4af37');g.addColorStop(1,'#b8960b');
    rr(x-w/2,y,w,h,h/2);cx.fillStyle=g;cx.fill();
    cx.beginPath();cx.moveTo(x-w*.4,y+2);cx.lineTo(x+w*.4,y+2);cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=1;cx.stroke();
    const rw=280*S,rh=7*S;
    const rg=cx.createLinearGradient(x-rw/2,y+h,x+rw/2,y+h);
    rg.addColorStop(0,'#9a7e08');rg.addColorStop(.5,'#c9a94e');rg.addColorStop(1,'#9a7e08');
    rr(x-rw/2,y+h,rw,rh,rh/2);cx.fillStyle=rg;cx.fill();
}

function drawTier(y,w,h,c1,c2,bdr){
    const x=CW/2;
    const g=cx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,c1);g.addColorStop(1,c2);
    sh(14,'rgba(0,0,0,0.35)',()=>{rr(x-w/2,y,w,h,10*S);cx.fillStyle=g;cx.fill()});
    rr(x-w/2,y,w,h,10*S);cx.strokeStyle=bdr||'rgba(212,175,55,0.18)';cx.lineWidth=1;cx.stroke();
    cx.beginPath();cx.moveTo(x-w*.42,y+2);cx.lineTo(x+w*.42,y+2);cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=1.5;cx.stroke();
    cx.beginPath();cx.moveTo(x-w*.4,y+h*.25);cx.lineTo(x+w*.4,y+h*.25);cx.strokeStyle='rgba(212,175,55,0.3)';cx.lineWidth=1.5;cx.stroke();
}

function drip(x,y,w,h){cx.beginPath();cx.moveTo(x,y);cx.bezierCurveTo(x,y+h*.6,x+w*.2,y+h,x+w/2,y+h);cx.bezierCurveTo(x+w*.8,y+h,x+w,y+h*.6,x+w,y);const g=cx.createLinearGradient(x,y,x,y+h);g.addColorStop(0,'rgba(255,250,240,0.85)');g.addColorStop(1,'rgba(245,235,215,0.4)');cx.fillStyle=g;cx.fill()}

function piping(cy,w,n){const x=CW/2-w/2,sp=w/(n-1);for(let i=0;i<n;i++){cx.beginPath();cx.arc(x+i*sp,cy,3.5*S,0,6.28);const g=cx.createRadialGradient(x+i*sp-S,cy-S,0,x+i*sp,cy,3.5*S);g.addColorStop(0,'#fff8f0');g.addColorStop(1,'#f0dcc0');cx.fillStyle=g;cx.fill()}}

function rosette(x,y,r){cx.beginPath();cx.arc(x,y,r,0,6.28);cx.fillStyle='#f5e6cc';cx.fill();cx.beginPath();cx.arc(x,y,r*.6,0,6.28);cx.fillStyle='#f0dcc0';cx.fill();cx.beginPath();cx.arc(x,y,r*.28,0,6.28);cx.fillStyle='#e8d4b8';cx.fill();cx.beginPath();cx.arc(x-r*.25,y-r*.25,r*.2,0,6.28);cx.fillStyle='rgba(255,255,255,0.3)';cx.fill()}

function berry(x,y,r){cx.beginPath();cx.arc(x,y,r,0,6.28);const g=cx.createRadialGradient(x-r*.3,y-r*.3,0,x,y,r);g.addColorStop(0,'#d4a0a7');g.addColorStop(1,'#b76e79');cx.fillStyle=g;cx.fill();cx.beginPath();cx.arc(x-r*.2,y-r*.2,r*.15,0,6.28);cx.fillStyle='rgba(255,255,255,0.25)';cx.fill()}

function straw(x,y,w,h){cx.beginPath();cx.ellipse(x,y,w/2,h/2,0,0,6.28);const g=cx.createRadialGradient(x-w*.1,y-h*.15,0,x,y,h/2);g.addColorStop(0,'#e85050');g.addColorStop(.55,'#c03030');g.addColorStop(1,'#a02020');cx.fillStyle=g;cx.fill();cx.fillStyle='rgba(255,220,150,0.45)';[[-w*.15,-h*.12],[w*.15,-h*.12],[-w*.1,h*.15],[w*.1,h*.15],[0,h*.25]].forEach(([dx,dy])=>{cx.beginPath();cx.ellipse(x+dx,y+dy,1.2*S,1.8*S,0,0,6.28);cx.fill()});cx.beginPath();cx.ellipse(x-w*.12,y-h/2-2*S,w*.35,3.5*S,-.2,0,6.28);cx.fillStyle='#4a8c3c';cx.fill();cx.beginPath();cx.ellipse(x+w*.08,y-h/2-2*S,w*.3,3*S,.15,0,6.28);cx.fillStyle='#3a7c2c';cx.fill();cx.beginPath();cx.moveTo(x,y-h/2-4*S);cx.lineTo(x,y-h/2-8*S);cx.strokeStyle='#3a7c2c';cx.lineWidth=1.2*S;cx.stroke()}

function macaron(x,y,w,h,c1,c2){cx.beginPath();cx.ellipse(x,y-h*.18,w/2,h*.38,0,Math.PI,0);cx.fillStyle=c1;cx.fill();cx.beginPath();cx.ellipse(x,y+h*.18,w/2,h*.38,0,0,Math.PI);cx.fillStyle=c2||c1;cx.fill();for(let i=0;i<5;i++){const rx=x-w/2+3*S+i*(w-6*S)/4;cx.beginPath();cx.ellipse(rx,y-h*.02,2.5*S,1.5*S,0,0,6.28);cx.fillStyle='rgba(255,255,255,0.15)';cx.fill()}cx.beginPath();cx.moveTo(x-w/2+3*S,y);cx.lineTo(x+w/2-3*S,y);cx.strokeStyle='rgba(255,255,255,0.35)';cx.lineWidth=2.5*S;cx.stroke();cx.beginPath();cx.ellipse(x-w*.15,y-h*.22,w*.2,h*.12,-.3,0,6.28);cx.fillStyle='rgba(255,255,255,0.2)';cx.fill()}

function shard(x,y,w,h,ang){cx.save();cx.translate(x,y);cx.rotate(ang);const g=cx.createLinearGradient(0,0,w,0);g.addColorStop(0,'#8B6914');g.addColorStop(.5,'#6B4F12');g.addColorStop(1,'#4a3510');cx.fillStyle=g;cx.beginPath();cx.moveTo(-w/2,0);cx.lineTo(w/2,0);cx.lineTo(w/2-1*S,-h);cx.lineTo(-w/2+2*S,-h);cx.closePath();cx.fill();cx.beginPath();cx.moveTo(-w/4,-h*.2);cx.lineTo(-w/4+1*S,-h*.8);cx.strokeStyle='rgba(255,255,255,0.12)';cx.lineWidth=1*S;cx.stroke();cx.restore()}

function leaf(x,y,w,h,ang){cx.save();cx.translate(x,y);cx.rotate(ang);const g=cx.createLinearGradient(-w/2,-h/2,w/2,h/2);g.addColorStop(0,'#d4af37');g.addColorStop(.4,'#f5e6cc');g.addColorStop(1,'#c9a94e');cx.globalAlpha=.55;cx.beginPath();cx.ellipse(0,0,w/2,h/2,0,0,6.28);cx.fillStyle=g;cx.fill();cx.beginPath();cx.moveTo(-w/3,0);cx.lineTo(w/3,0);cx.strokeStyle='rgba(255,255,255,0.2)';cx.lineWidth=.8*S;cx.stroke();cx.globalAlpha=1;cx.restore()}

function pearl(x,y,r){cx.beginPath();cx.arc(x,y,r,0,6.28);const g=cx.createRadialGradient(x-r*.3,y-r*.3,0,x,y,r);g.addColorStop(0,'#f5e6cc');g.addColorStop(.5,'#d4af37');g.addColorStop(1,'#b8960b');cx.fillStyle=g;cx.fill()}

function candle(x,y,h,t){const cw=5*S;const g=cx.createLinearGradient(x-cw/2,y,x+cw/2,y);g.addColorStop(0,'#ffc5a0');g.addColorStop(.5,'#e8a088');g.addColorStop(1,'#d4887a');cx.fillStyle=g;rr(x-cw/2,y,cw,h,2*S);cx.fill();cx.fillStyle='rgba(255,255,255,0.1)';cx.fillRect(x-cw/2,y+5*S,cw,1.5*S);cx.fillRect(x-cw/2,y+12*S,cw,1.5*S);cx.beginPath();cx.ellipse(x+cw*.3,y+8*S,2*S,4*S,0,0,6.28);cx.fillStyle='rgba(255,200,170,0.3)';cx.fill();const fk=Math.sin(t*8)*.12+Math.cos(t*13)*.06;const fx=x+fk*4,fy=y-10*S;const og=cx.createRadialGradient(fx,fy,0,fx,fy,18*S);og.addColorStop(0,'rgba(255,180,50,0.2)');og.addColorStop(1,'transparent');cx.fillStyle=og;cx.beginPath();cx.arc(fx,fy,18*S,0,6.28);cx.fill();cx.beginPath();cx.ellipse(fx,fy,4.5*S,(9+Math.sin(t*11)*1.5)*S,fk*.3,0,6.28);const fg=cx.createRadialGradient(fx,fy+2*S,0,fx,fy,9*S);fg.addColorStop(0,'#ffffff');fg.addColorStop(.25,'#ffd700');fg.addColorStop(.65,'#ff9500');fg.addColorStop(1,'rgba(255,100,0,0)');cx.fillStyle=fg;cx.fill();cx.beginPath();cx.ellipse(fx,fy+1*S,2*S,5*S,fk*.2,0,6.28);const ig=cx.createRadialGradient(fx,fy+1*S,0,fx,fy+1*S,5*S);ig.addColorStop(0,'#ffffff');ig.addColorStop(.5,'rgba(255,255,200,0.6)');ig.addColorStop(1,'transparent');cx.fillStyle=ig;cx.fill()}

function heart(x,y,sz){cx.save();cx.translate(x,y);cx.beginPath();cx.moveTo(0,sz*.25);cx.bezierCurveTo(-sz*.15,-sz*.4,-sz*.7,-sz*.3,-sz*.45,sz*.15);cx.bezierCurveTo(-sz*.25,sz*.55,0,sz*.8,0,sz*.8);cx.bezierCurveTo(0,sz*.8,sz*.25,sz*.55,sz*.45,sz*.15);cx.bezierCurveTo(sz*.7,-sz*.3,sz*.15,-sz*.4,0,sz*.25);const hg=cx.createLinearGradient(0,-sz*.4,0,sz*.8);hg.addColorStop(0,'#e8a0a0');hg.addColorStop(1,'#d47070');cx.fillStyle=hg;cx.fill();cx.beginPath();cx.ellipse(-sz*.15,sz*.05,sz*.08,sz*.12,-.3,0,6.28);cx.fillStyle='rgba(255,255,255,0.25)';cx.fill();cx.restore()}

function goldDust(x,y,t){const a=(Math.sin(t*2+x*.1)+1)*.3+.1;cx.beginPath();cx.arc(x,y,1.2*S,0,6.28);cx.fillStyle=`rgba(212,175,55,${a})`;cx.fill()}

function drawCake(t){
    cx.clearRect(0,0,CW,CH);const c=CW/2;
    const gg=cx.createRadialGradient(c,CH*.42,0,c,CH*.42,160*S);gg.addColorStop(0,'rgba(212,175,55,0.1)');gg.addColorStop(.4,'rgba(183,110,121,0.04)');gg.addColorStop(1,'transparent');cx.fillStyle=gg;cx.fillRect(0,0,CW,CH);
    const sY=CH-28*S,t1=sY-75*S,t2=t1-68*S+5*S,t3=t2-62*S+5*S,t4=t3-55*S+5*S;
    drawStand();
    drawTier(t1,240*S,75*S,'#e8d4b8','#d0b896');for(let i=0;i<6;i++)drip(c-115*S+i*46*S,t1,10*S,(16+Math.sin(i*2.1)*6)*S);piping(t1+5*S,220*S,10);rosette(c-95*S,t1+60*S,7*S);rosette(c+95*S,t1+60*S,7*S);rosette(c,t1+62*S,6*S);straw(c-45*S,t1+15*S,13*S,16*S);straw(c+45*S,t1+15*S,13*S,16*S);leaf(c-68*S,t1+16*S,11*S,7*S,-.3);leaf(c+68*S,t1+16*S,11*S,7*S,.3);berry(c-20*S,t1+55*S,4.5*S);berry(c+20*S,t1+55*S,4.5*S);for(let i=0;i<5;i++)pearl(c-90*S+i*45*S,t1+28*S,2.2*S);for(let i=0;i<3;i++)goldDust(c-60*S+i*60*S,t1+40*S,t+i*.5);
    drawTier(t2,200*S,68*S,'#f0dfc8','#dcc8a8');for(let i=0;i<5;i++)drip(c-90*S+i*45*S,t2,9*S,(14+Math.sin(i*1.8)*5)*S);piping(t2+5*S,185*S,8);rosette(c-72*S,t2+10*S,6*S);rosette(c+72*S,t2+10*S,6*S);rosette(c,t2+12*S,5*S);straw(c-35*S,t2+55*S,11*S,14*S);straw(c+35*S,t2+55*S,11*S,14*S);straw(c,t2+8*S,10*S,12*S);leaf(c-55*S,t2+55*S,9*S,6*S,-.2);leaf(c+55*S,t2+55*S,9*S,6*S,.2);berry(c-18*S,t2+10*S,4*S);berry(c+18*S,t2+10*S,4*S);for(let i=0;i<4;i++)pearl(c-65*S+i*43*S,t2+22*S,2*S);for(let i=0;i<3;i++)goldDust(c-40*S+i*40*S,t2+35*S,t+i*.7);
    drawTier(t3,165*S,62*S,'#f6eada','#e4d4c0','rgba(212,175,55,0.24)');for(let i=0;i<4;i++)drip(c-72*S+i*48*S,t3,8*S,(12+Math.sin(i*2.3)*5)*S);piping(t3+5*S,150*S,7);rosette(c-58*S,t3+50*S,5.5*S);rosette(c+58*S,t3+50*S,5.5*S);rosette(c,t3+8*S,4.5*S);straw(c-28*S,t3+10*S,10*S,12*S);straw(c+28*S,t3+10*S,10*S,12*S);leaf(c-48*S,t3+10*S,9*S,5.5*S,-.25);leaf(c+48*S,t3+10*S,9*S,5.5*S,.25);berry(c-12*S,t3+48*S,4*S);berry(c+12*S,t3+48*S,4*S);for(let i=0;i<3;i++)pearl(c-45*S+i*45*S,t3+20*S,2*S);
    drawTier(t4,130*S,55*S,'#fcf3e8','#ede0d0','rgba(212,175,55,0.28)');for(let i=0;i<5;i++)drip(c-56*S+i*28*S,t4,8*S,(15+Math.sin(i*1.9)*7)*S);piping(t4+5*S,118*S,6);macaron(c-38*S,t4-8*S,20*S,16*S,'#d4a0c0','#c090b0');macaron(c+38*S,t4-6*S,17*S,14*S,'#a0c8d4','#90b8c4');shard(c-6*S,t4-5*S,7*S,38*S,-.2);shard(c+6*S,t4-3*S,6*S,32*S,.15);shard(c-14*S,t4-2*S,5.5*S,26*S,-.35);rosette(c-18*S,t4+5*S,5*S);rosette(c+18*S,t4+5*S,5*S);straw(c-10*S,t4-12*S,13*S,16*S);straw(c+12*S,t4-10*S,11*S,14*S);leaf(c-28*S,t4+8*S,10*S,6*S,-.2);leaf(c+28*S,t4+8*S,10*S,6*S,.2);for(let i=0;i<3;i++)pearl(c-30*S+i*30*S,t4+18*S,2*S);for(let i=0;i<4;i++)goldDust(c-25*S+i*17*S,t4+12*S,t+i*.4);
    candle(c-22*S,t4-38*S,32*S,t);candle(c,t4-42*S,36*S,t);candle(c+22*S,t4-38*S,32*S,t);
    heart(c,t4-72*S,14*S);
    for(let i=0;i<6;i++)goldDust(c-80*S+i*32*S,sY-4*S,t+i*.3);
}

function cakeLoop(t){try{drawCake(t/1000)}catch(e){}requestAnimationFrame(cakeLoop)}

/* ============ AUDIO ============ */
let actx=null,musicOn=false;
function ensureA(){if(!actx){actx=new(AudioContext||webkitAudioContext)();if(actx.state==='suspended')actx.resume()}return actx}
function mkRv(sec){const c=actx.createConvolver(),sr=actx.sampleRate,len=sr*sec,buf=actx.createBuffer(2,len,sr);for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2)}c.buffer=buf;return c}

function startMusic(){
    if(musicOn)return;musicOn=true;ensureA();
    const m=actx.createGain();m.gain.value=.12;m.connect(actx.destination);
    const rv=mkRv(4),rg=actx.createGain();rg.gain.value=.3;rv.connect(rg);rg.connect(m);
    const dr=actx.createGain();dr.gain.value=.7;dr.connect(m);
    const wf=actx.createBiquadFilter();wf.type='lowpass';wf.frequency.value=850;wf.Q.value=.6;wf.connect(dr);wf.connect(rv);
    [98,130.81,164.81,196].forEach(f=>{const o=actx.createOscillator();o.type='sine';o.frequency.value=f;const g=actx.createGain();g.gain.setValueAtTime(0,actx.currentTime);g.gain.linearRampToValueAtTime(f<120?.035:.06,actx.currentTime+5);o.connect(g);g.connect(wf);o.start()});
    const ns=[523.25,587.33,659.25,783.99,880,783.99,659.25,587.33,523.25,440,392];let ni=0;
    !function ml(){const f=ns[ni++%ns.length],o=actx.createOscillator();o.type='sine';o.frequency.value=f;const g=actx.createGain(),t=actx.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.04,t+.7);g.gain.exponentialRampToValueAtTime(.001,t+5);const fl=actx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=1050;o.connect(fl);fl.connect(g);g.connect(dr);g.connect(rv);o.start(t);o.stop(t+5.5);setTimeout(ml,Math.random()*3800+2800)}();
    !function ch(){const fs=[1046.5,1318.51,1567.98,2093],f=fs[Math.random()*4|0],o=actx.createOscillator();o.type='sine';o.frequency.value=f;const g=actx.createGain(),t=actx.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.015,t+.06);g.gain.exponentialRampToValueAtTime(.001,t+3.5);o.connect(g);g.connect(rv);o.start(t);o.stop(t+3.5);setTimeout(ch,Math.random()*12000+8000)}();
}

function playChime(){if(!actx)return;[880,1108.73,1318.51].forEach((f,i)=>{const o=actx.createOscillator();o.type='sine';o.frequency.value=f;const g=actx.createGain(),t=actx.currentTime+i*.13;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.03,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+2.2);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+2.2)})}

/* ============ VOICE ============ */
let recog=null;
function startVoice(){
    const SR=SpeechRecognition||webkitSpeechRecognition;
    if(!SR){document.querySelector('#voiceBar span').textContent='当前浏览器不支持语音识别';return}
    recog=new SR();recog.continuous=true;recog.interimResults=true;recog.lang='zh-CN';recog.maxAlternatives=3;
    recog.onstart=()=>document.getElementById('micIcon').classList.add('active');
    recog.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;if(['小芮是谁','小蕊是谁','小睿是谁','小瑞是谁'].some(x=>t.includes(x)))trigger()};
    recog.onerror=e=>{if(e.error==='not-allowed')document.querySelector('#voiceBar span').textContent='请允许麦克风权限'};
    recog.onend=()=>setTimeout(()=>{try{recog.start()}catch(e){}},900);
    try{recog.start()}catch(e){}
}

let busy=false;
function trigger(){if(busy)return;busy=true;rippleEff();playChime();setTimeout(()=>{showToast();speak()},700);setTimeout(()=>{busy=false},5500)}
function rippleEff(){for(let i=0;i<3;i++)setTimeout(()=>{const r=document.createElement('div');r.className='ripple';document.body.appendChild(r);setTimeout(()=>r.remove(),1800)},i*350)}

let bestVoice=null;
function loadV(){const v=speechSynthesis.getVoices();if(!v.length)return;const zh=v.filter(x=>x.lang.includes('zh'));bestVoice=zh.find(x=>/男|Male|male|Google|Ting|Liang/i.test(x.name))||zh[0]||null}
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadV;loadV();

function speak(){speechSynthesis.cancel();ensureA();const u=new SpeechSynthesisUtterance('小芮是我的宝宝');u.lang='zh-CN';u.rate=.82;u.pitch=1.35;u.volume=1;if(bestVoice)u.voice=bestVoice;speechSynthesis.speak(u)}

function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3800)}

/* ============ SPARKLE ============ */
document.addEventListener('click',e=>{for(let i=0;i<8;i++){const s=document.createElement('div');s.className='spark';const a=(6.28/8)*i,d=Math.random()*45+25;s.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px`;document.body.appendChild(s);setTimeout(()=>s.remove(),700)}});

/* ============ START FLOW ============ */
document.getElementById('startOverlay').addEventListener('click',function(){
    this.classList.add('hide');
    setTimeout(()=>{
        this.style.display='none';
        // Play slideshow, then show cake
        playSlideshow(()=>{
            const scene=document.getElementById('cakeScene');
            scene.classList.add('show');
            requestAnimationFrame(cakeLoop);
            startMusic();
            startVoice();
            setTimeout(()=>document.getElementById('voiceBar').classList.add('show'),1500);
        });
    },1000);
});

/* ============ RESIZE ============ */
addEventListener('resize',()=>{rszP();initCake()});
</script>
